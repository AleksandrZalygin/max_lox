services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waterdb}
      POSTGRES_USER: ${POSTGRES_USER:-water}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-water} -d ${POSTGRES_DB:-waterdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-water}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-waterdb}
      VPS_WS_URL: ${VPS_WS_URL:-}
      VPS_API_KEY: ${VPS_API_KEY:-}
      STATION_ID: ${STATION_ID:-station_001}
    env_file:
      - .env
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
